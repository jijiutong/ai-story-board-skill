<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Story Studio</title>
  <link rel="stylesheet" href="css/studio.css">
</head>
<body class="ws-disconnected">
  <div class="app-shell">
    <!-- Left Toolbar -->
    <nav class="toolbar" id="toolbar">
      <div class="toolbar-item active" data-tool="storyboard" onclick="switchTool('storyboard')" title="故事板">
        <span class="toolbar-icon">🎬</span>
        <span class="toolbar-label">故事板</span>
      </div>
      <div class="toolbar-item" data-tool="character" onclick="switchTool('character')" title="角色设计">
        <span class="toolbar-icon">👤</span>
        <span class="toolbar-label">角色</span>
      </div>
      <div class="toolbar-item" data-tool="scene" onclick="switchTool('scene')" title="场景概念">
        <span class="toolbar-icon">🏞️</span>
        <span class="toolbar-label">场景</span>
      </div>
      <div class="toolbar-item" data-tool="video" onclick="switchTool('video')" title="分镜转视频">
        <span class="toolbar-icon">🎥</span>
        <span class="toolbar-label">视频</span>
      </div>
      <div class="toolbar-item" data-tool="poster" onclick="switchTool('poster')" title="海报">
        <span class="toolbar-icon">🎨</span>
        <span class="toolbar-label">海报</span>
      </div>
      <div class="toolbar-item" data-tool="allinone" onclick="switchTool('allinone')" title="一键全来">
        <span class="toolbar-icon">⚡</span>
        <span class="toolbar-label">全来</span>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-item" data-tool="pro" onclick="switchTool('pro')" title="专业画布">
        <span class="toolbar-icon">🟣</span>
        <span class="toolbar-label">专业</span>
      </div>
      <div class="toolbar-item" data-tool="config" onclick="switchTool('config')" title="配置">
        <span class="toolbar-icon">⚙️</span>
        <span class="toolbar-label">配置</span>
      </div>
      <div class="toolbar-spacer"></div>
      <div class="toolbar-item" onclick="toggleTheme()" title="切换主题">
        <span class="toolbar-icon" id="themeIcon">🌙</span>
        <span class="toolbar-label">主题</span>
      </div>
      <div class="toolbar-ws" id="toolbarWs" title="连接状态">⚫</div>
    </nav>

    <!-- Main Workspace -->
    <main class="workspace" id="workspace">
      <!-- Content rendered dynamically by tool switch -->
    </main>
  </div>

  <!-- Chat Bar (pro tool) -->
  <div class="chat-bar" id="chatBarContainer" style="display:none">
    <input type="text" id="chatInput" class="chat-input" placeholder="💬 /help 查看命令，或直接打字..." />
    <button class="btn btn-send" id="chatSendBtn">发送</button>
  </div>

  <!-- Preview overlay -->
  <div class="preview-overlay" id="previewPanelContainer" style="display:none"></div>

  <!-- Scripts -->
  <script src="js/api-client.js"></script>
  <script src="js/market-view.js"></script>
  <script src="js/sidebar-tools.js"></script>
  <script src="js/node-library.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/pro-view.js"></script>
  <script src="js/config-panel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
